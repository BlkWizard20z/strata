name: Fetch ThreatFox

on:
  schedule:
    # Runs daily at 13:30 UTC -- 30 min after the KEV job so the two aren't
    # committing at the exact same moment and racing each other.
    - cron: "30 13 * * *"
  workflow_dispatch: {}

# Allows the workflow to commit the fetched + enriched data back to the repo.
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run ThreatFox fetch script
        env:
          THREATFOX_AUTH_KEY: ${{ secrets.THREATFOX_AUTH_KEY }}
        run: python3 scripts/fetch_threatfox.py

      - name: Enrich families from Malpedia
        env:
          # Optional -- only used if you've added this secret. Works without it.
          MALPEDIA_APITOKEN: ${{ secrets.MALPEDIA_APITOKEN }}
        run: python3 scripts/enrich_families.py

      - name: Copy latest.json into docs/ for GitHub Pages
        run: |
          mkdir -p docs/data/threatfox
          cp data/threatfox/latest.json docs/data/threatfox/latest.json

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/threatfox/ docs/data/threatfox/ data/enrichment/
          git diff --staged --quiet || git commit -m "Update ThreatFox + enrichment data $(date -u +'%Y-%m-%d')"
          git push